# Malware Unified Analyzer — runtime config (override via MAU_CONFIG)

phases:
  surface:
    enabled: true
    timeout_sec: 600
    # Docker container name for docker exec (slim surface or REMnux)
    container: ""
  dynamic:
    enabled: false
    timeout_sec: 120
  unpack:
    enabled: true
    timeout_sec: 180
    max_attempts_per_sample: 2
  static:
    enabled: true
    timeout_sec: 600
    ghidra_image: ghidra-headless:latest
    max_children: 0

docker:
  socket_url: unix://var/run/docker.sock
  network_none: true
  mem_limit: 4g

ollama:
  enabled: false
  base_url: http://host.docker.internal:11434
  model: llama3.2

report:
  html: true
  executive_summary_llm: false

intake:
  enabled: true
  passwords: ["", "infected", "malware", "virus"]
  max_extract_mb: 500
  max_files: 200
  max_nested_depth: 8
