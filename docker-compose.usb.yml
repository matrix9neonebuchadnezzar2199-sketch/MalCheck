# Malware Unified Analyzer — USB/offline friendly stack
#
# Assumptions:
# - All required images are already loaded from `images/*.tar(.gz)` by deploy.sh/deploy.bat
# - No build steps are used here (prevents offline build failures)

services:
  surface:
    image: mal-surface:latest
    container_name: surface-analyzer
    networks:
      - mgmt-net
    volumes:
      - ${SAMPLES_DIR:-./samples}:/samples:ro
      - ${RESULTS_DIR:-./results}/surface:/results/surface
      - ${RULES_DIR:-./rules}:/rules:ro
    environment:
      - RULES_DIR=/rules
    restart: unless-stopped

  orchestrator:
    image: mal-orchestrator:latest
    container_name: orchestrator
    networks:
      - mgmt-net
    volumes:
      - ${SAMPLES_DIR:-./samples}:/samples
      - ${RESULTS_DIR:-./results}:/results
      - ${CONFIG_DIR:-./compose/config}:/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MAU_CONFIG=/config/analyzer.yaml
      - SAMPLES_DIR=/samples
      - RESULTS_DIR=/results
      - SURFACE_CONTAINER=surface-analyzer
      - REMNUX_CONTAINER=surface-analyzer
      - MAU_LOG_LEVEL=${MAU_LOG_LEVEL:-INFO}
    depends_on:
      - surface
    restart: unless-stopped

  web:
    image: mal-web:latest
    container_name: mau-web
    networks:
      - mgmt-net
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ${SAMPLES_DIR:-./samples}:/samples
      - ${RESULTS_DIR:-./results}:/results
      - ${CONFIG_DIR:-./compose/config}:/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MAU_CONFIG=/config/analyzer.yaml
      - SAMPLES_DIR=/samples
      - RESULTS_DIR=/results
      - SURFACE_CONTAINER=surface-analyzer
      - REMNUX_CONTAINER=surface-analyzer
    depends_on:
      - surface
    restart: unless-stopped

networks:
  mgmt-net:
    driver: bridge

