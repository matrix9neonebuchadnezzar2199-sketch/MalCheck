<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title }}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    .box { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; margin-top: 1rem; }
    pre { background: #f6f6f6; padding: 1rem; overflow: auto; font-size: 0.85rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    .err { color: #a00; }
  </style>
</head>
<body>
  <h1>{{ title }}</h1>
  <p>Upload a sample file for analysis (runs surface + optional static Ghidra).</p>
  <form id="f" class="box" enctype="multipart/form-data">
    <input type="file" name="file" required />
    <button type="submit">Analyze</button>
  </form>
  <div id="out" class="box" style="display:none;">
    <pre id="json"></pre>
  </div>
  <p id="e" class="err"></p>
  <script>
    document.getElementById("f").onsubmit = async (ev) => {
      ev.preventDefault();
      const fd = new FormData(ev.target);
      document.getElementById("e").textContent = "";
      try {
        const r = await fetch("/analyze", { method: "POST", body: fd });
        const j = await r.json();
        if (!r.ok) throw new Error(j.detail || r.statusText);
        document.getElementById("out").style.display = "block";
        document.getElementById("json").textContent = JSON.stringify(j, null, 2);
      } catch (e) {
        document.getElementById("e").textContent = String(e);
      }
    };
  </script>
</body>
</html>
